# Listen on 0.0.0.0:7860 so Gradio is reachable on the instance public IP + port.
services:
  meridian:
    build: .
    image: meridian-mcp:latest
    ports:
      - "0.0.0.0:7860:7860"
    env_file:
      - .env
    environment:
      PORT: "7860"
      GRADIO_SERVER_NAME: "0.0.0.0"
    restart: unless-stopped
